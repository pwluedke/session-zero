<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Session Zero</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .landing-card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 16px;
      padding: 3rem 2.5rem;
      text-align: center;
      width: 100%;
      max-width: 420px;
    }

    .landing-card h1 {
      font-size: 2rem;
      color: #f5c842;
      margin-bottom: 0.5rem;
    }

    .landing-card .tagline {
      color: #9a9ab0;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      font-style: italic;
    }

    .landing-card .landing-desc {
      color: #c0c0d0;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    .landing-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }

    .demo-btn {
      display: inline-block;
      background: #f5c842;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 0.85rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
      max-width: 280px;
    }

    .demo-btn:hover {
      opacity: 0.88;
    }

    .divider {
      color: #4a4a6a;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }

    .google-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      background: transparent;
      color: #9a9ab0;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .google-btn:hover {
      border-color: #4a4a7a;
      color: #c0c0d0;
    }

    .google-btn svg {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="landing-card">
    <h1>Session Zero</h1>
    <p class="tagline">So many games, so little night.</p>
    <p class="landing-desc">Filter your board game library and get AI-powered picks for tonight's group.</p>
    <div class="landing-actions">
      <a href="/demo" class="demo-btn" data-testid="demo-btn">Try the Demo</a>
      <span class="divider">or</span>
      <a href="/auth/google" class="google-btn" data-testid="google-signin-btn">
        <svg width="16" height="16" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>
    </div>
  </div>
</body>
</html>
